{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameHub</title>

    <link rel="stylesheet" href="{% static 'main/landingPage.css' %}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="vanta-bg"></div>
    <div class="overlay"></div>

    <main class="hero">
      <h1>GameHub</h1>
      <p>Play, compete, and track your progress.</p>

      <div class="button-group">
        <a href="{% url 'loginPage' %}" class="btn btn-primary">Login</a>
        <a href="{% url 'registerPage' %}" class="btn btn-secondary">Sign Up</a>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
      VANTA.NET({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200,
        minWidth: 200,
        scale: 1,
        scaleMobile: 1,
        color: 0x4cc9f0,
        backgroundColor: 0x050816,
        points: 11,
        maxDistance: 20,
        spacing: 17,
      });
    </script>
  </body>
</html>
