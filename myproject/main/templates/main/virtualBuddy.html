{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Testing Virtual Buddy page</title>
        <link rel="stylesheet" href="{% static 'main/virtualbuddy.css' %}" />
    </head>

    <div class = "buddy-container">
        <!-- LEFT: THE AVATAR -->
         <div class="avatar-selection">
            <img src="/media/test_image.png" class="avatar">

         </div>

        <!-- RIGHT: Inventory Grid -->
         <div class="inventory-section">
            <div class="grid" style="background-color: #342f3d;">
                {% for item in backpack.items.all %}
                <!--
                    <p>TEST ITEM: {{ item.itemName }}</p>
                    <img src="{{ item.itemImage.url }}" style="width:100px;">
                -->
                    <div class="cell">
                        <img src="{{ item.itemImage.url }}" alt="{{ item.itemName }}">
                    </div>
                {% empty %}
                    <p>NO ITEMS</p>
                {% endfor %}
            </div>
         </div>
    </div>

</html>
